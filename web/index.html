<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <script src="deploy-mode.js"></script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    // 部署模式由构建脚本生成的 deploy-mode.js 注入
    // embedded 模式：使用本地字体，避免运行时从 CDN 下载
    // standalone 模式：使用 CDN 字体（默认行为）
    var config = {
      // canvaskit 加载路径由构建标志控制：
      // embedded 模式使用 --no-web-resources-cdn，从本地加载引擎资源
      // standalone 模式不传此标志，从 CDN 加载引擎资源
      canvasKitVariant: "full",
    };
    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      // 使用本地托管的字体文件，避免从 Google CDN 下载
      // 字体文件位于 web/fonts/ 目录下
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
